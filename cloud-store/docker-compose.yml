# ProClaw Cloud-Store Docker Compose 配置
# 用于本地开发和生产部署

version: '3.8'

services:
  # 主应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-store-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_SITE_URL=${SITE_URL:-http://localhost:3000}
      - AI_UPSTREAM_URL=${AI_UPSTREAM_URL:-}
      - AI_UPSTREAM_KEY=${AI_UPSTREAM_KEY:-}
      - AI_UPSTREAM_MODEL=${AI_UPSTREAM_MODEL:-deepseek-chat}
      - NEXT_PUBLIC_PAYMENT_METHOD=${PAYMENT_METHOD:-mock}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - cloud-store-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: cloud-store-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cloudstore}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/tenant_schema_v2.sql:/docker-entrypoint-initdb.d/01-tenant-schema.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - cloud-store-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: cloud-store-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - cloud-store-network

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: cloud-store-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cloud-store-network
    profiles:
      - with-nginx

networks:
  cloud-store-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
