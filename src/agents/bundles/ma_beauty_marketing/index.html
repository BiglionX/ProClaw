<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>营销活动助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0faf0; color: #333; }
.header { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); color: #fff; padding: 20px; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.campaign-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; padding: 16px; }
.campaign-card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.campaign-card .campaign-icon { font-size: 28px; margin-bottom: 8px; }
.campaign-card .campaign-name { font-weight: 700; font-size: 16px; }
.campaign-card .campaign-desc { font-size: 13px; color: #666; margin-top: 4px; }
.campaign-card .campaign-meta { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; color: #999; }
.campaign-card .campaign-status { padding: 3px 10px; border-radius: 12px; font-size: 12px; }
.campaign-card .status-active { background: #e8f5e9; color: #27ae60; }
.campaign-card .status-paused { background: #fff3e0; color: #e67e22; }
.campaign-card .status-draft { background: #f5f5f5; color: #999; }
.analytics { padding: 0 16px 16px; }
.analytics h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #555; }
.analytics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.analytics-card { background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
.analytics-card .num { font-size: 24px; font-weight: 700; color: #27ae60; }
.analytics-card .label { font-size: 12px; color: #999; margin-top: 4px; }
.actions { padding: 0 16px 16px; }
.actions h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #555; }
.action-btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; text-align: center; }
.btn-wakeup { background: #e8f5e9; color: #27ae60; }
.btn-birthday { background: #fce4ec; color: #e91e63; }
.btn-recharge { background: #fff3e0; color: #e67e22; }
.btn-coupon { background: #e3f2fd; color: #1976d2; }
</style>
</head>
<body>
<div class="header">
  <h1>🎯 营销活动助手</h1>
  <p>沉睡唤醒 · 生日礼 · 充值满赠 · 优惠券发放</p>
</div>
<div class="analytics">
  <h2>📊 活动效果概览</h2>
  <div class="analytics-grid">
    <div class="analytics-card"><div class="num">128</div><div class="label">沉睡唤醒数</div></div>
    <div class="analytics-card"><div class="num">23.6%</div><div class="label">唤醒转化率</div></div>
    <div class="analytics-card"><div class="num">45</div><div class="label">本月新客</div></div>
    <div class="analytics-card"><div class="num">¥12,680</div><div class="label">活动营收</div></div>
  </div>
</div>
<div class="campaign-grid" style="padding-top:0;">
  <div class="campaign-card"><div class="campaign-icon">💤</div><div class="campaign-name">沉睡唤醒</div><div class="campaign-desc">针对30天未到店客户，自动推送优惠券</div><div class="campaign-meta"><span>触达 86 人</span><span class="campaign-status status-active">进行中</span></div></div>
  <div class="campaign-card"><div class="campaign-icon">🎂</div><div class="campaign-name">生日礼遇</div><div class="campaign-desc">本月生日客户享免费护理或双倍积分</div><div class="campaign-meta"><span>触达 12 人</span><span class="campaign-status status-active">进行中</span></div></div>
  <div class="campaign-card"><div class="campaign-icon">💰</div><div class="campaign-name">充值满赠</div><div class="campaign-desc">充值2000送300，充5000送1000</div><div class="campaign-meta"><span>参与 23 人</span><span class="campaign-status status-active">进行中</span></div></div>
  <div class="campaign-card"><div class="campaign-icon">🏷️</div><div class="campaign-name">新客专享券</div><div class="campaign-desc">首次到店享8折优惠</div><div class="campaign-meta"><span>领取 45 张</span><span class="campaign-status status-draft">草稿</span></div></div>
</div>
<script>
(async function() {
  try {
    const user = await window.proclaw.getCurrentUser();
    console.log('[BeautyMarketing] Current user:', user);
  } catch(e) {
    console.log('[BeautyMarketing] Running in standalone mode');
  }
})();
</script>
</body>
</html>
