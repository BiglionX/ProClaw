<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美业服务顾问</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f4f9; color: #333; }
.header { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); color: #fff; padding: 20px; }
.header h1 { font-size: 22px; font-weight: 700; }
.header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
.stats { display: flex; gap: 12px; padding: 16px; flex-wrap: wrap; }
.stat-card { background: #fff; border-radius: 10px; padding: 16px; flex: 1; min-width: 100px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.stat-card .num { font-size: 26px; font-weight: 700; color: #9b59b6; }
.stat-card .label { font-size: 12px; color: #999; margin-top: 4px; }
.section { padding: 0 16px 16px; }
.section h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; color: #555; }
.appt-list { background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.appt-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
.appt-item:last-child { border-bottom: none; }
.appt-time { min-width: 50px; font-weight: 700; color: #9b59b6; font-size: 14px; }
.appt-info { flex: 1; margin-left: 12px; }
.appt-name { font-weight: 600; font-size: 14px; }
.appt-meta { font-size: 12px; color: #999; margin-top: 2px; }
.appt-status { font-size: 12px; padding: 3px 10px; border-radius: 12px; }
.status-pending { background: #fff3e0; color: #e67e22; }
.status-in-progress { background: #e3f2fd; color: #1976d2; }
.status-done { background: #e8f5e9; color: #27ae60; }
.employee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
.emp-card { background: #fff; border-radius: 10px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.emp-card .emp-avatar { width: 48px; height: 48px; border-radius: 50%; background: #9b59b6; color: #fff; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 18px; font-weight: 700; }
.emp-card .emp-name { font-weight: 600; font-size: 14px; }
.emp-card .emp-status { font-size: 11px; margin-top: 4px; }
.emp-free { color: #27ae60; }
.emp-busy { color: #e74c3c; }
</style>
</head>
<body>
<div class="header">
  <h1>💅 美业服务顾问</h1>
  <p>预约管理 · 服务推荐 · 技师排班 · 客户洞察</p>
</div>
<div class="stats">
  <div class="stat-card"><div class="num">8</div><div class="label">今日预约</div></div>
  <div class="stat-card"><div class="num">3</div><div class="label">进行中</div></div>
  <div class="stat-card"><div class="num">5</div><div class="label">空闲技师</div></div>
  <div class="stat-card"><div class="num">4</div><div class="label">沉睡客户</div></div>
</div>
<div class="section">
  <h2>👩‍💼 技师排班</h2>
  <div class="employee-grid">
    <div class="emp-card"><div class="emp-avatar">王</div><div class="emp-name">王小明</div><div class="emp-status emp-free">🟢 空闲中</div></div>
    <div class="emp-card"><div class="emp-avatar">李</div><div class="emp-name">李婷</div><div class="emp-status emp-busy">🔴 服务中 (30min)</div></div>
    <div class="emp-card"><div class="emp-avatar">张</div><div class="emp-name">张丽</div><div class="emp-status emp-free">🟢 空闲中</div></div>
    <div class="emp-card"><div class="emp-avatar">陈</div><div class="emp-name">陈芳</div><div class="emp-status emp-busy">🔴 服务中 (15min)</div></div>
  </div>
</div>
<div class="section">
  <h2>📅 今日预约</h2>
  <div class="appt-list">
    <div class="appt-item"><div class="appt-time">09:30</div><div class="appt-info"><div class="appt-name">刘女士 - 面部护理</div><div class="appt-meta">王小明 · 60min</div></div><span class="appt-status status-done">已完成</span></div>
    <div class="appt-item"><div class="appt-time">10:30</div><div class="appt-info"><div class="appt-name">赵女士 - 染发</div><div class="appt-meta">李婷 · 90min</div></div><span class="appt-status status-in-progress">服务中</span></div>
    <div class="appt-item"><div class="appt-time">14:00</div><div class="appt-info"><div class="appt-name">孙女士 - 美甲</div><div class="appt-meta">张丽 · 45min</div></div><span class="appt-status status-pending">待服务</span></div>
    <div class="appt-item"><div class="appt-time">15:30</div><div class="appt-info"><div class="appt-name">周女士 - 剪发</div><div class="appt-meta">陈芳 · 30min</div></div><span class="appt-status status-pending">待服务</span></div>
  </div>
</div>
<script>
(async function() {
  try {
    const user = await window.proclaw.getCurrentUser();
    console.log('[BeautyAssistant] Current user:', user);
  } catch(e) {
    console.log('[BeautyAssistant] Running in standalone mode');
  }
})();
</script>
</body>
</html>
