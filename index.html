<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/proclaw-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProClaw Desktop - AI-Powered Business OS</title>
  </head>
  <body style="margin:0;background:#0f0c29;">
    <div id="root">
      <!-- v7: 内联加载指示器 - React 挂载后自动替换 -->
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                   height:100vh;font-family:system-ui,sans-serif;color:#fff;background:#0f0c29;">
        <div style="width:48px;height:48px;border:3px solid rgba(255,59,48,0.3);
                    border-top-color:#ff3b30;border-radius:50%;
                    animation:proclaw-spin 0.8s linear infinite;"></div>
        <p style="margin-top:16px;font-size:14px;color:rgba(255,255,255,0.6);">正在加载 ProClaw...</p>
      </div>
    </div>
    <noscript>
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;
                  font-family:system-ui;background:#0f0c29;color:#fff;text-align:center;">
        <div><h2 style="color:#ff3b30;">JavaScript Required</h2>
        <p>ProClaw needs JavaScript. Check WebView2 settings.</p></div>
      </div>
    </noscript>
    <style>@keyframes proclaw-spin { to { transform: rotate(360deg); } }</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
