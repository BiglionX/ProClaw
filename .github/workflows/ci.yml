name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== Frontend ====================
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --ext .ts,.tsx --max-warnings 0 || true

  frontend-test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage --reporter=verbose

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

  # ==================== Backend (Rust) ====================
  rust-fmt:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
        working-directory: src-tauri

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    needs: rust-fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: cargo clippy --all-targets --all-features -- -A clippy::redundant_closure -A clippy::needless_borrow -A clippy::needless_borrows_for_generic_args -A clippy::too_many_arguments -A clippy::useless_format -A clippy::empty_line_after_doc_comments -A clippy::single_component_path_imports
        working-directory: src-tauri

  rust-test:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    needs: [rust-clippy, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - run: cargo test --all-features -- --test-threads=1
        working-directory: src-tauri

  rust-build:
    name: Rust Release Build (Check)
    runs-on: ubuntu-latest
    needs: [rust-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - run: cargo check --release
        working-directory: src-tauri

  # ==================== Platform Builds (release only) ====================
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-test, frontend-build, rust-test, rust-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: proclaw-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-test, frontend-build, rust-test, rust-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: proclaw-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend-test, frontend-build, rust-test, rust-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: proclaw-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
