## 三、分阶段详解

### 阶段 1：联系人列表 → 聊天页

#### 入口与触发

| 触发点 | 文件 | 路径参数 | 备注 |
|--------|------|----------|------|
| 联系人列表行点击 | ContactsPage.tsx | \`/chat/:contactId\` | 主入口 |
| 联系人列表头像点击 | ContactsPage.tsx | \`/chat/:contactId\` | 等同行点击 |
| 消息列表会话行 | MessagesPage.tsx | \`/chat/:contactId\` | 二级入口 |
| TeamsPage Agent 卡片 | TeamsPage.tsx | \`/chat/:agentId\` | AI 快捷入口 |
| TeamsPage 团队卡片 | TeamsPage.tsx | \`/chat/:groupId\` | AI Team 群聊 |

#### 关键逻辑

- \`contactId\` 形态决定后续路由（见阶段 2）
- 联系人头像优先读取 \`agent_profile_overrides.display_name\` / \`avatar_key\` / \`custom_avatar_path\`
- 若无 override，回退到 \`agentMarketService\` 默认头像（\`getDefaultAvatarUrl\`）

### 阶段 2：聊天页头部头像 → 详情页

#### 跳转规则表

| contactId 形态 | 跳转目标 | 备注 | 是否实现 |
|----------------|---------|------|----------|
| \`ai-team-group-*\`（群聊） | \`/team-profile/:teamId\` | 类似 QQ 群资料 | ✅ 已实现 |
| \`ceo-agent\`（CEO 特殊身份） | 不响应 | 保留老板/总监身份特殊 | ✅ 已实现 |
| \`ma_*\` / \`builtin-*\`（Agent） | \`/agent-profile/:agentId\` | 单 Agent 个人资料页 | ✅ 已实现 |
| 传统群组 \`contact_type='group'\` | 不响应 | 预留 | ✅ 已实现 |
| 内部 / 外部联系人 | \`/agent-profile/:contactId\` | 沿用原逻辑 | ✅ 已实现 |

#### 关键代码

\`\`\`typescript
const handleHeadAvatarClick = () => {
  if (!contactId) return;
  // 1) AI Team 群聊 → 跳到 AI Team 小组详情页
  if (isGroupChat) {
    const teamId = parseTeamId(contactId);
    navigate(\`/team-profile/\${teamId}\`);
    return;
  }
  // 2) CEO Agent 不响应
  if (isCEO) return;
  // 3) 传统群组 → 预留
  if (contact?.contact_type === 'group') return;
  // 4) 单 Agent / 内部 / 外部 → Agent 资料页
  navigate(\`/agent-profile/\${contactId}\`);
};
\`\`\`

### 阶段 4：Agent 能力配置（Skill 设置与微调）

#### 能力配置卡片结构

| ListItem | 控件 | 行为 | 状态 |
|----------|------|------|------|
| 启用 Agent | \`Switch\` | 本地切换（\`setAgentEnabled\`） | 立即生效（Snackbar 提示） |
| 聊天对话 | \`Button\` → \`navigate('/chat/' + agentId)\` | 跳回聊天 | — |
| 语音通话 | \`Button\` → \`dispatchEvent('proclaw:start-call', { agentId, mode: 'audio' })\` | 跳转 \`/call\` + 触发事件 | — |
| 视频通话 | \`Button\` → \`dispatchEvent('proclaw:start-call', { agentId, mode: 'video' })\` | 跳转 \`/call\` + 触发事件 | — |
| 权限声明 | \`Chip\` 列表（只读） | 显示 manifest.permissions | — |

#### 操作按钮区

| 按钮 | 触发函数 | 行为 |
|------|---------|------|
| **保存** | \`handleSave\` | 调用 \`saveAgentProfileOverride(agentId, fields)\`，成功后 Snackbar 提示"已保存" |
| **恢复默认** | \`handleReset\` | 调用 \`resetAgentProfile(agentId)\`，confirm 弹窗后清空 override |
| **返回** | \`navigate(-1)\` | 返回上一页（聊天 / 联系人） |

## 五、数据流与持久化

### 5.1 数据模型（SQLite）

表 \`agent_profile_overrides\`（参考 \`database/migrations/\`）：

| 字段 | 类型 | 说明 |
|------|------|------|
| \`agent_id\` | TEXT PRIMARY KEY | 关联 Agent manifest id |
| \`display_name\` | TEXT NULL | 自定义昵称，覆盖 manifest.name |
| \`avatar_key\` | TEXT NULL | 预设头像 key（如 'agent_red_01'） |
| \`custom_avatar_path\` | TEXT NULL | 用户上传头像的相对路径 |
| \`updated_at\` | TEXT | 更新时间 |

### 5.2 数据流图

\`\`\`mermaid
graph LR
    UI[UI 操作] --> State[React State<br/>editName/editAvatarKey/customAvatarDataUrl]
    State --> Save[saveAgentProfileOverride]
    Save --> Tauri[Tauri invoke<br/>save_agent_profile_override]
    Tauri --> SQLite[(SQLite<br/>agent_profile_overrides)]
    SQLite --> Reload[页面 useEffect<br/>重新读取 override]
    Reload --> Display[联系人 / 聊天 / 详情页<br/>自动应用新头像昵称]
\`\`\`

### 5.3 头像读取优先级

\`\`\`
contactService.getContactAvatar(contactId)
  ├─ 1. agent_profile_overrides.custom_avatar_path（自定义）
  ├─ 2. agent_profile_overrides.avatar_key（预设库）
  └─ 3. agentMarketService.getDefaultAvatarUrl(agentId)（默认）
\`\`\`

### 11.5 Agent 会话流式调用 AI

参考 \`ChatDetailScreen.tsx#L112-L193\`：

\`\`\`typescript
if (targetType === 'agent') {
  setAiThinking(true);
  // 取最近 20 条消息作为上下文
  const history = messagesRef.current.slice(-20).map((m) => ({
    role: m.sender_type === 'self' ? 'user' : 'assistant',
    content: m.content,
  }));
  // 调用 AIService.chatWithAgentStream (SSE)
  await chatWithAgentStream(targetId, history, (chunk) => {
    setMessages((prev) => /* 增量更新最后一条 AI 消息 */);
  });
  setAiThinking(false);
}
\`\`\`

关键点：
- 用 \`messagesRef.current\` 解决 \`useCallback\` 闭包捕获旧值问题
- 流式输出以"打字机"形式逐字更新最后一条消息
- \`aiThinking\` 状态控制输入区上方的"AI 思考中"提示

## 十二、AI Team 群聊特殊状态机

> 配套实现：\`src/lib/aiTeamChatService.ts\` / \`docs/prd/AI Team 页面 UI 重构与交互体验优化（PRD v12.0）.md\`

### 12.1 AI Team 角色模型

| 角色 | 身份 | 权限 | 来源 |
|------|------|------|------|
| **Boss** | 真实用户（老板/总监） | 创建团队、邀请 Agent、转让群主、退出、解散、@任何人 | 用户当前登录身份 |
| **CEO Agent** | 主控官（系统内置） | 自动响应 Boss 消息、调度子 Agent、汇报进展 | AI Team 内置 |
| **Agent 成员** | 各业务 Agent（秘书/客服/财务/任务/CRM） | 接收 CEO 派发任务、汇报结果 | 来自 \`aiTeamGroups.ts\` |

### 12.2 Boss 操作状态机

\`\`\`mermaid
stateDiagram-v2
    [*] --> NotInTeam: 初始

    NotInTeam --> Creator: 进入 TeamsPage<br/>点击"创建团队"
    NotInTeam --> Invitee: 进入 TeamsPage<br/>选择"加入团队"

    Creator --> Boss: 填写团队信息<br/>选择初始成员<br/>确认创建
    Invitee --> Boss: 系统自动以 Boss 身份<br/>加入已有团队

    state Boss {
        [*] --> Active
        Active --> Transferring: 触发"转让群主"<br/>选择新 Boss
        Transferring --> Active: 新 Boss 确认接管<br/>原 Boss 降为 Member
        Transferring --> Active: 取消转让
        Active --> RemovingMember: 点击成员行<br/>"移除成员"
        RemovingMember --> Active: 确认移除<br/>（CEO 不能被移除）
        Active --> LeavingTeam: 触发"退出团队"<br/>二次确认
        LeavingTeam --> Active: 取消退出
        LeavingTeam --> Dissolving: 二次确认<br/>"解散团队"
        Dissolving --> TeamArchived: 团队归档<br/>所有会话保留只读
        Active --> Messaging: 与团队对话<br/>(CEO 自动回复)
        Messaging --> Active: 流式输出完成
    }

    Boss --> NotInTeam: 退出团队<br/>主动离开
    Boss --> TeamArchived: 解散团队

    state TeamArchived {
        [*] --> ReadOnly: 群组进入只读
        ReadOnly --> [*]: 30 天后自动清理
    }
\`\`\`

### 12.3 Boss 邀请 Agent 状态机

\`\`\`mermaid
stateDiagram-v2
    [*] --> Idle: Boss 在 TeamProfilePage

    Idle --> OpenInviteDialog: 点击"邀请成员"
    OpenInviteDialog --> SelectingAgents: 弹出 Agent 列表<br/>(多选 Checkbox)
    SelectingAgents --> Confirming: 至少选 1 个 Agent
    SelectingAgents --> Idle: 取消/关闭 Dialog

    Confirming --> Inviting: 点击"确认邀请"
    Inviting --> InvitedSuccess: 后端写入群组成员<br/>Snackbar "已邀请 N 个 Agent"
    Inviting --> InvitedFail: 网络错误/重复邀请<br/>Snackbar 错误提示
    InvitedSuccess --> Idle: Dialog 关闭<br/>成员列表刷新
    InvitedFail --> SelectingAgents: 回到选择状态<br/>保留已选项

    Idle --> MaxMembersReached: 团队成员数 = MAX (20)<br/>"邀请" 按钮置灰
\`\`\`

### 12.4 CEO Agent 自动响应状态机

参考 \`aiTeamChatService.ts#L85-L111\`：

\`\`\`mermaid
stateDiagram-v2
    [*] --> Idle: Boss 未发消息

    Idle --> Receiving: Boss 发送消息<br/>(sendMessage)
    Receiving --> TokenCheck: 估算 token 消耗<br/>(estimateTotalTokens)

    TokenCheck --> InsufficientTokens: isDemoAccount() &&<br/>balance <= 0
    TokenCheck --> BuildingPrompt: 余额充足 / 非演示账号

    InsufficientTokens --> NotifyBoss: 返回提示<br/>"演示 Token 已用完"
    NotifyBoss --> Idle: 显示系统提示<br/>不调用 LLM

    BuildingPrompt --> CallingLLM: SystemMessage +<br/>History (max 10) +<br/>HumanMessage
    CallingLLM --> Streaming: invoke LLM<br/>(30s timeout)
    CallingLLM --> TimedOut: 30s 超时
    CallingLLM --> NetworkError: DNS/连接失败
    CallingLLM --> UserCancelled: Boss 点击"停止生成"

    Streaming --> DeducingTokens: 流式输出完成<br/>(estimateTokens +<br/>response_metadata)
    Streaming --> UserCancelled: Boss 中途取消

    DeducingTokens --> Replied: deductTokens()<br/>replyContent 显示
    TimedOut --> Replied: 返回超时错误信息
    NetworkError --> Replied: 返回网络错误信息
    UserCancelled --> Replied: aborted=true<br/>不扣 token

    Replied --> Idle: 等待下一条消息
\`\`\`

### 12.5 关键状态转移表

| 当前状态 | 触发事件 | 前置条件 | 下一状态 | 副作用 |
|---------|---------|---------|---------|-------|
| \`Boss.Active\` | 邀请 Agent | 成员数 < 20 | \`Boss.OpenInviteDialog\` | 无 |
| \`Boss.Active\` | 转让群主 | 新 Boss 必须已加入团队 | \`Boss.Transferring\` | 无 |
| \`Boss.Transferring\` | 新 Boss 确认 | 双方在线 | \`Boss.Active\`（身份降级） | 原 Boss → Member |
| \`Boss.Active\` | 退出团队 | 二次确认 | \`NotInTeam\` | 团队保留，新 Boss 自动接管 |
| \`Boss.Active\` | 解散团队 | 二次确认 | \`TeamArchived.ReadOnly\` | 所有会话保留只读 |
| \`Boss.Active\` | 移除成员 | 不能移除 CEO | \`Boss.Active\` | 该 Agent 退出群聊 |
| \`Receiving\` | LLM 30s 超时 | — | \`TimedOut\` | 返回"⏱️ 出站连接超时" |
| \`Receiving\` | LLM 网络错误 | — | \`NetworkError\` | 返回"⚠️ 无法连接到 AI 服务" |
| \`Receiving\` | Boss 取消 | AbortSignal | \`UserCancelled\` | \`aborted=true\`,不扣 token |
| \`Receiving\` | 演示账号余额=0 | \`isDemoAccount()\` | \`InsufficientTokens\` | 返回"演示 Token 已用完" |

### 13.7 已知稳定性策略

- **避免 SPA Fallback**：用 hash 路由（\`page.goto('/#/agent-profile/ceo-agent')\`）而非 path 路由
- **Demo 账号兜底**：用 \`test.skip()\` 而非 \`test.fail()\`，避免 demo 数据缺失时全量失败
- **宽容选择器**：\`main .MuiAvatar-root\` 限定 main 区，避免误中 sidebar
- **fallback 选择器链**：header avatar → main avatar → skip，避免硬绑定导致误判

`;

  // 2. 配置 marked 选项
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      gfm: true,
      breaks: false,
      pedantic: false,
    });
  }

  // 3. 自定义渲染器：把 mermaid 代码块包裹在 <div class="mermaid"> 中
  if (typeof marked !== 'undefined') {
    var renderer = new marked.Renderer();
    var originalCode = renderer.code.bind(renderer);
    renderer.code = function (code, infostring) {
      var lang = (infostring || '').trim().toLowerCase();
      if (lang === 'mermaid') {
        return '<div class="mermaid">\n' + code + '\n</div>';
      }
      return originalCode(code, infostring, function () { return false; });
    };
    // marked v9+ 新签名：(code, infostring, escaped)
    // 兼容旧签名
    if (renderer.code.length === 3) {
      renderer.code = function (code, infostring) {
        var lang = (infostring || '').trim().toLowerCase();
        if (lang === 'mermaid') {
          return '<div class="mermaid">\n' + code + '\n</div>';
        }
        return '<pre><code class="language-' + this.options.langPrefix + lang + '">' +
          (typeof code === 'string' ? code.replace(/</g, '&lt;').replace(/>/g, '&gt;') : code) +
          '</code></pre>';
      };
    }
    marked.use({ renderer: renderer });
  }

  // 4. 渲染 Markdown 到 #content
  var contentEl = document.getElementById('content');
  try {
    contentEl.innerHTML = marked.parse(md);
  } catch (e) {
    contentEl.innerHTML = '<div class="error-banner">❌ Markdown 渲染失败：' +
      (e && e.message ? e.message : String(e)) + '</div>' +
      '<pre>' + md.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
    return;
  }

  // 5. 初始化 Mermaid 并渲染所有 .mermaid 块
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      flowchart: { useMaxWidth: true, htmlLabels: true },
      sequence: { useMaxWidth: true },
      stateDiagram: { useMaxWidth: true },
    });
    // 用 mermaid.run() 处理所有 mermaid 块（v10 API）
    try {
      mermaid.run({ querySelector: '.mermaid' }).then(function () {
        console.log('[ProClaw UX] ' + document.querySelectorAll('.mermaid svg').length + ' 个 Mermaid 图渲染完成');
      }).catch(function (err) {
        console.error('[ProClaw UX] Mermaid 渲染失败:', err);
        // 降级：保留原始代码块内容
        document.querySelectorAll('.mermaid').forEach(function (el) {
          if (!el.querySelector('svg')) {
            var code = el.textContent;
            el.innerHTML = '<pre style="color:#d4a72c">' +
              code.replace(/</g, '&lt;').replace(/>/g, '&gt;') +
              '</pre>';
          }
        });
      });
    } catch (e) {
      console.error('[ProClaw UX] Mermaid init failed:', e);
    }
  } else {
    // 没有 mermaid：把 .mermaid 块降级为 <pre>
    document.querySelectorAll('.mermaid').forEach(function (el) {
      var code = el.textContent;
      el.innerHTML = '<pre>' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>';
    });
    contentEl.insertAdjacentHTML('afterbegin',
      '<div class="error-banner">⚠️ Mermaid CDN 加载失败，流程图已降级为代码块。请检查网络连接后刷新页面。</div>'
    );
  }

  // 6. 给所有标题加锚点（用于 TOC 跳转）
  document.querySelectorAll('#content h1, #content h2, #content h3').forEach(function (h) {
    if (h.id) {
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.style.cssText = 'color:inherit;text-decoration:none;';
      a.innerHTML = h.innerHTML;
      h.innerHTML = '';
      h.appendChild(a);
    }
  });
})();
</script>
