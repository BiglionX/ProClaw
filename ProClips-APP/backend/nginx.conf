# ============================================================
# ProClips Backend 反向代理（Nginx）
# 用法：
#   1) 把本文件部署到 /etc/nginx/sites-available/proclips.conf
#   2) ln -s /etc/nginx/sites-available/proclips.conf /etc/nginx/sites-enabled/
#   3) nginx -t && systemctl reload nginx
#   4) 申请证书：certbot --nginx -d api-proclips.example.com
# 前置：
#   - 后端 Docker 已起来并监听 127.0.0.1:4000
#   - DNS A 记录已指向本机公网 IP
# ============================================================

# --- 80 端口：仅用于 ACME 验证 + 强制跳转 HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name api-proclips.example.com;   # ★ 改成你的域名

    # Let's Encrypt 自动续期会访问这个路径
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    # 其他全部 301 跳 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 443 端口：主服务 ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api-proclips.example.com;   # ★ 改成你的域名

    # === SSL 证书（certbot 申请后会自动写好下面两行） ===
    ssl_certificate     /etc/letsencrypt/live/api-proclips.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-proclips.example.com/privkey.pem;

    # === SSL 安全配置 ===
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS：强制浏览器一年走 HTTPS（含子域）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === 性能调优（视频上传/下载需要） ===
    client_max_body_size      120m;   # 后端限制 100MB + 余量
    client_body_buffer_size   128k;
    client_body_timeout       300s;
    send_timeout              300s;
    proxy_connect_timeout     60s;
    proxy_send_timeout        300s;
    proxy_read_timeout        300s;
    proxy_buffering            off;   # 流式上传/下载
    proxy_request_buffering   off;   # 不缓存请求体，边读边转发
    proxy_http_version        1.1;

    # 启用 gzip（仅对文本类型）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # === 访问日志 ===
    access_log /var/log/nginx/proclips.access.log;
    error_log  /var/log/nginx/proclips.error.log warn;

    # === 静态资源：直接命中，不走 Fastify ===
    location ^~ /static/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 视频文件缓存 7 天
        location ~* \.(mp4|mov|webm|m4a|wav)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # === 健康检查：绕过日志 ===
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    # === 其余全部转发到后端 ===
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket / LiveKit 通道预留（如未来加流式推送）
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}